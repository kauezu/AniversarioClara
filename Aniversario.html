<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Carta para Clara</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #2b2b2b, #000000);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  /* ENVELOPE MAIOR */
  .envelope {
    position: relative;
    width: 360px;
    height: 240px;
    background: #111111;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(255,215,0,0.6);
    overflow: hidden;
  }

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-top: 120px solid #1a1a1a;
    transform-origin: top;
    transition: transform 0.6s ease;
    z-index: 3;
  }

  /* PAPEL PRETO MAIOR */
  .letter {
    position: absolute;
    bottom: 0;
    left: 15px;
    width: 330px;
    height: 210px;
    border-radius: 22px;
    padding: 30px;
    box-sizing: border-box;

    background: linear-gradient(145deg, #1f1f1f, #000000);
    color: #ffd700;

    box-shadow:
      0 0 30px rgba(255,215,0,0.5),
      inset 0 0 18px rgba(255,215,0,0.15);

    transform: translateY(150%);
    opacity: 0;
    transition: transform 0.6s ease, opacity 0.4s ease;

    text-align: center;
  }

  .letter h2 {
    margin: 0;
    font-size: 26px;
    color: #ffd700;
  }

  .letter p {
    margin-top: 14px;
    font-size: 18px;
    color: #e6e6e6;
  }

  .emoji {
    font-size: 34px;
    margin-top: 12px;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter {
    transform: translateY(-30px);
    opacity: 1;
  }

  .hint {
    position: absolute;
    bottom: -45px;
    width: 100%;
    text-align: center;
    color: #ffd700;
    font-size: 16px;
    opacity: 0.85;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 0.85; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="envelope" id="envelope">
  <div class="flap"></div>

  <div class="letter">
    <h2>Feliz Aniversário, Clara 💛</h2>
    <p>Amo muito você, tonhona.</p>
    <p>Te amo hoje e sempre 💛</p>
    <div class="emoji">🥰</div>
  </div>

  <div class="hint">Clique na carta</div>
</div>

<script>
  const envelope = document.getElementById("envelope");

  envelope.addEventListener("click", () => {
    envelope.classList.toggle("open");
  });
</script>

</body>
</html>
